services:

  # ── Banco de Dados ──────────────────────────────────────────────────────────
  db:
    container_name: movieflix-dw
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-movieflix}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-P4ssw0rd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-movieflix}"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── Aplicação Flask ─────────────────────────────────────────────────────────
  app:
    container_name: movieflix-app
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:P4ssw0rd@db:5432/movieflix}
      FLASK_ENV:    ${FLASK_ENV:-production}
      SECRET_KEY:   ${SECRET_KEY:-P4ssw0rd}
    volumes:
      # Data Lake montado como somente-leitura dentro do container
      - ./data/lake:/app/data/lake:ro
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy

  # ── Pipeline: Data Lake → Data Warehouse → Data Mart ────────────────────────
  etl:
    container_name: movieflix-pipeline
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:P4ssw0rd@db:5432/movieflix}
    volumes:
      - ./data:/app/data
    command: python data/scripts/etl_load.py
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Nginx (proxy reverso) ────────────────────────────────────────────────────
  nginx:
    container_name: movieflix-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  postgres_data:
